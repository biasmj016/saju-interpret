apiVersion: v1
kind: ConfigMap
metadata:
  name: saju-interpret-dashboard
  labels:
    grafana_dashboard: "1"
data:
  saju-interpret-dashboard.json: |
    {
      "dashboard": {
        "title": "Saju Interpret Metrics",
        "tags": ["spring-boot", "saju-interpret"],
        "timezone": "browser",
        "panels": [
          {
            "title": "HTTP Request Rate",
            "targets": [
              {
                "expr": "rate(http_server_requests_seconds_count{application=\"saju-interpret\"}[5m])",
                "legendFormat": "{{method}} {{uri}} {{status}}"
              }
            ],
            "type": "graph"
          },
          {
            "title": "HTTP Request Duration",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{application=\"saju-interpret\"}[5m]))",
                "legendFormat": "p95 {{method}} {{uri}}"
              },
              {
                "expr": "histogram_quantile(0.99, rate(http_server_requests_seconds_bucket{application=\"saju-interpret\"}[5m]))",
                "legendFormat": "p99 {{method}} {{uri}}"
              }
            ],
            "type": "graph"
          },
          {
            "title": "JVM Memory Usage",
            "targets": [
              {
                "expr": "jvm_memory_used_bytes{application=\"saju-interpret\"}",
                "legendFormat": "{{area}} {{id}}"
              }
            ],
            "type": "graph"
          },
          {
            "title": "JVM GC Pause Time",
            "targets": [
              {
                "expr": "rate(jvm_gc_pause_seconds_sum{application=\"saju-interpret\"}[5m])",
                "legendFormat": "{{action}} {{cause}}"
              }
            ],
            "type": "graph"
          },
          {
            "title": "CPU Usage",
            "targets": [
              {
                "expr": "system_cpu_usage{application=\"saju-interpret\"}",
                "legendFormat": "System CPU"
              },
              {
                "expr": "process_cpu_usage{application=\"saju-interpret\"}",
                "legendFormat": "Process CPU"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Active Threads",
            "targets": [
              {
                "expr": "jvm_threads_live_threads{application=\"saju-interpret\"}",
                "legendFormat": "Live Threads"
              }
            ],
            "type": "graph"
          }
        ],
        "time": {
          "from": "now-6h",
          "to": "now"
        },
        "refresh": "30s"
      }
    }
