spring:
  application:
    name: saju-interpret
  
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

client:
  public-data:
    base-url: http://apis.data.go.kr
    service-key: ${SECRET_KEY}
    endpoints:
      lunar-calendar: /B090041/openapi/service/LrsrCldInfoService/getLunCalInfo

logging:
  level:
    root: INFO
    com.saju: DEBUG
