apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: saju-interpret
  labels:
    app: saju-interpret
    release: prometheus
spec:
  selector:
    matchLabels:
      app: saju-interpret
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 30s
    scrapeTimeout: 10s
