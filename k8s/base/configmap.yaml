apiVersion: v1
kind: ConfigMap
metadata:
  name: saju-interpret-config
data:
  application.yaml: |
    server:
      port: 8080
      shutdown: graceful
    
    spring:
      application:
        name: saju-interpret
      lifecycle:
        timeout-per-shutdown-phase: 30s
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus,metrics
          base-path: /actuator
      endpoint:
        health:
          probes:
            enabled: true
          show-details: always
      metrics:
        export:
          prometheus:
            enabled: true
        tags:
          application: ${spring.application.name}
      prometheus:
        metrics:
          export:
            enabled: true
    
    logging:
      level:
        root: INFO
        com.saju: DEBUG
      pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
        file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
